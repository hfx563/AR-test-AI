<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drivers — GreenEdge Resources</title>
  <link rel="stylesheet" href="style.css">
  <script src="auth.js"></script>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">🌿 Green<span>Edge</span></a>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a><a href="dashboard.html">Dashboard</a>
    <a href="jobs.html">Orders</a><a href="trips.html">Deliveries</a>
    <a href="drivers.html" class="active">Drivers</a><a href="maintenance.html">Maintenance</a>
    <a href="invoices.html">Invoices</a><a href="admin.html">Admin</a><a href="about.html">Contact</a>
    <a href="#" onclick="logout()" style="color:#ffaaaa;">Logout</a>
  </div>
  <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<div class="section">
  <div class="page-header">
    <div><h1 class="section-title" style="margin-bottom:.25rem;">👷 Driver Management</h1><p class="section-sub" style="margin-bottom:0;">Manage delivery drivers and track performance</p></div>
    <button class="btn btn-primary" onclick="openDriverModal()">+ Add Driver</button>
  </div>

  <div id="driverCards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;margin-bottom:2rem;"></div>

  <div class="card">
    <h2 style="font-size:1.05rem;color:var(--green-dark);margin-bottom:1rem;">📊 Driver Trip Summary</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Driver</th><th>Phone</th><th>License</th><th>Total Trips</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="driversBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="driverModal">
  <div class="modal">
    <div class="modal-header"><h3 id="driverModalTitle">Add Driver</h3><button class="modal-close" onclick="closeModal('driverModal')">✕</button></div>
    <input type="hidden" id="dId">
    <div class="form-group"><label>Full Name *</label><input type="text" id="dName" placeholder="John Smith"></div>
    <div class="form-row">
      <div class="form-group"><label>Phone</label><input type="tel" id="dPhone" placeholder="(555) 000-0000"></div>
      <div class="form-group"><label>License #</label><input type="text" id="dLicense" placeholder="DL-123456"></div>
    </div>
    <div class="form-group"><label>Status</label>
      <select id="dStatus"><option value="active">Active</option><option value="inactive">Inactive</option></select>
    </div>
    <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1rem;">
      <button class="btn btn-outline" onclick="closeModal('driverModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDriver()">Save Driver</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<footer><p>© 2025 GreenEdge Landscaping Resources · <a href="index.html">Home</a></p></footer>

<script>
let editDriverId = null;
function toast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.style.background=err?'var(--red)':'var(--green-dark)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function closeModal(id){document.getElementById(id).classList.remove('open');}

async function loadDrivers() {
  const [drivers, trips] = await Promise.all([fetch('/api/drivers').then(r=>r.json()), fetch('/api/trips').then(r=>r.json())]);
  const tripCounts = {};
  trips.forEach(t => { if(t.driver_id) tripCounts[t.driver_id] = (tripCounts[t.driver_id]||0)+1; });

  // Cards
  document.getElementById('driverCards').innerHTML = drivers.map(d => `
    <div class="card">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
        <div style="width:50px;height:50px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;">👷</div>
        <div>
          <div style="font-weight:700;color:var(--green-dark);">${d.name}</div>
          <div style="font-size:.82rem;color:var(--muted);">${d.phone||'No phone'}</div>
        </div>
        <span class="badge badge-${d.status}" style="margin-left:auto;">${d.status}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;font-size:.85rem;margin-bottom:1rem;">
        <div><span style="color:var(--muted);">License:</span> ${d.license||'—'}</div>
        <div><span style="color:var(--muted);">Trips:</span> <strong>${tripCounts[d.id]||0}</strong></div>
      </div>
      <div style="display:flex;gap:.5rem;">
        <button class="btn btn-outline btn-sm" onclick="openDriverModal('${d.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteDriver('${d.id}')">Delete</button>
      </div>
    </div>`).join('') || '<p style="color:var(--muted);">No drivers yet.</p>';

  // Table
  document.getElementById('driversBody').innerHTML = drivers.map(d => `
    <tr>
      <td><strong>${d.name}</strong></td>
      <td>${d.phone||'—'}</td>
      <td>${d.license||'—'}</td>
      <td><strong>${tripCounts[d.id]||0}</strong></td>
      <td><span class="badge badge-${d.status}">${d.status}</span></td>
      <td style="display:flex;gap:.3rem;">
        <button class="btn btn-outline btn-sm" onclick="openDriverModal('${d.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteDriver('${d.id}')">Del</button>
      </td>
    </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--muted);">No drivers yet.</td></tr>';
}

function openDriverModal(id=null) {
  editDriverId = id;
  document.getElementById('driverModalTitle').textContent = id ? 'Edit Driver' : 'Add Driver';
  if (!id) { ['dId','dName','dPhone','dLicense'].forEach(f=>document.getElementById(f).value=''); document.getElementById('dStatus').value='active'; }
  else {
    fetch('/api/drivers').then(r=>r.json()).then(drivers=>{
      const d=drivers.find(x=>x.id===id); if(!d) return;
      document.getElementById('dId').value=d.id;
      document.getElementById('dName').value=d.name;
      document.getElementById('dPhone').value=d.phone||'';
      document.getElementById('dLicense').value=d.license||'';
      document.getElementById('dStatus').value=d.status||'active';
    });
  }
  document.getElementById('driverModal').classList.add('open');
}

async function saveDriver() {
  const body = { name: document.getElementById('dName').value.trim(), phone: document.getElementById('dPhone').value.trim(), license: document.getElementById('dLicense').value.trim(), status: document.getElementById('dStatus').value };
  if (!body.name) return toast('Name is required.', true);
  const headers = {'Content-Type':'application/json','x-admin-token':sessionStorage.getItem('adminToken')||''};
  if (editDriverId) { await fetch(`/api/drivers/${editDriverId}`, {method:'PUT',headers,body:JSON.stringify(body)}); toast('✅ Driver updated.'); }
  else { await fetch('/api/drivers', {method:'POST',headers,body:JSON.stringify(body)}); toast('✅ Driver added.'); }
  closeModal('driverModal'); loadDrivers();
}

async function deleteDriver(id) {
  if (!confirm('Delete this driver?')) return;
  await fetch(`/api/drivers/${id}`, {method:'DELETE',headers:{'x-admin-token':sessionStorage.getItem('adminToken')||''}});
  toast('🗑️ Driver deleted.'); loadDrivers();
}

function logout(){fetch('/api/auth/logout',{method:'POST',headers:{'x-admin-token':sessionStorage.getItem('adminToken')||''}});sessionStorage.removeItem('adminToken');location.replace('login.html');}
loadDrivers();
</script>
</body>
</html>
