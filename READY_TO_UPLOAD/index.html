<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Travel - Discover Your Next Destination</title>
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https://secure.geonames.org https://nominatim.openstreetmap.org https://api.open-meteo.com https://en.wikipedia.org https://overpass-api.de https://api.rss2json.com https://api.allorigins.win https://source.unsplash.com https://images.unsplash.com https://api.ipify.org https://ipapi.co https://freesound.org; media-src 'self' blob: https://freesound.org;">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Discover amazing destinations worldwide. Search cities, explore attractions, and plan your perfect trip with Luxe Travel.">
    <meta name="keywords" content="travel, destinations, city guide, tourism, vacation planning">
    <meta name="author" content="Luxe Travel">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Luxe Travel - Discover Your Next Destination">
    <meta property="og:description" content="Explore cities worldwide and discover amazing places to visit.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=1200&h=630&fit=crop">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Luxe Travel - Discover Your Next Destination">
    <meta name="twitter:description" content="Explore cities worldwide and discover amazing places to visit.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700;900&family=Montserrat:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-text">LUXE</span>
            </div>
        </div>
    </nav>

    <!-- World News Modal -->
    <div id="newsModal" class="news-modal" style="display: none;">
        <div class="news-modal-overlay" id="newsModalOverlay"></div>
        <div class="news-modal-content">
            <div class="news-modal-header">
                <h2 id="newsModalTitle">World News</h2>
                <button class="news-close-btn" id="closeNewsBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="news-modal-body" id="newsContent">
                <div class="news-loading">Loading news...</div>
            </div>
        </div>
    </div>

    <!-- Hero Section with Search -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Where will you go?</h1>
            
            <!-- IP Address Display -->
            <div class="ip-display" id="ipDisplay">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
                <span id="ipAddress">Loading your IP...</span>
            </div>
            
            <!-- Camera Section -->
            <div class="camera-section" id="cameraSection">
                <button id="toggleMusicBtn" class="music-toggle-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                    <span>Play Music</span>
                </button>
                <button id="toggleCameraBtn" class="camera-toggle-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                    <span>Turn On Camera</span>
                </button>
                <div id="cameraContainer" class="camera-container" style="display: none;">
                    <video id="cameraVideo" autoplay playsinline></video>
                    <button id="closeCameraBtn" class="close-camera-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- Search Box -->
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter destination" class="search-input">
                <div id="autocompleteContainer"></div>
                <button id="searchButton" class="search-btn">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                        <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16zM19 19l-4.35-4.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            
            <!-- News Buttons -->
            <div class="hero-news-buttons">
                <button id="worldNewsBtn" class="hero-news-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                    <span>World News</span>
                </button>
                <button id="halifaxNewsBtn" class="hero-news-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span>Halifax News</span>
                </button>
                <button id="pathankotNewsBtn" class="hero-news-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span>Pathankot News</span>
                </button>
                <button id="nepalNewsBtn" class="hero-news-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span>Nepal News</span>
                </button>
            </div>
        </div>
    </section>

    <!-- City Info Section -->
    <section class="city-info-section" id="cityInfoSection" style="display: none;">
        <div class="container">
            <div class="city-info-card">
                <div class="city-header">
                    <h2 class="city-name" id="cityName"></h2>
                    <p class="city-country" id="cityCountry"></p>
                </div>
                <div class="city-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="weatherInfo">—</div>
                        <div class="stat-label">Weather</div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-value" id="populationInfo">—</div>
                        <div class="stat-label">Population</div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-value" id="cityType">—</div>
                        <div class="stat-label">Classification</div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-value" id="regionInfo">—</div>
                        <div class="stat-label">Region</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Categories Section -->
    <section class="categories-section" id="categoriesSection" style="display: none;">
        <div class="container">
            <h2 class="section-title">Select Experience</h2>
            <div class="categories-grid" id="categories">
                <div class="category-card" data-category="landmark">
                    <div class="category-image" style="background-image: url('https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=600&h=800&fit=crop');"></div>
                    <div class="category-overlay"></div>
                    <div class="category-content">
                        <h3 class="category-title">Heritage</h3>
                    </div>
                </div>
                <div class="category-card" data-category="nature">
                    <div class="category-image" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&h=800&fit=crop');"></div>
                    <div class="category-overlay"></div>
                    <div class="category-content">
                        <h3 class="category-title">Nature</h3>
                    </div>
                </div>
                <div class="category-card" data-category="food">
                    <div class="category-image" style="background-image: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=600&h=800&fit=crop');"></div>
                    <div class="category-overlay"></div>
                    <div class="category-content">
                        <h3 class="category-title">Dining</h3>
                    </div>
                </div>
                <div class="category-card" data-category="culture">
                    <div class="category-image" style="background-image: url('https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=600&h=800&fit=crop');"></div>
                    <div class="category-overlay"></div>
                    <div class="category-content">
                        <h3 class="category-title">Arts</h3>
                    </div>
                </div>
                <div class="category-card" data-category="waterfront">
                    <div class="category-image" style="background-image: url('https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=600&h=800&fit=crop');"></div>
                    <div class="category-overlay"></div>
                    <div class="category-content">
                        <h3 class="category-title">Coastal</h3>
                    </div>
                </div>
                <div class="category-card" data-category="nightlife">
                    <div class="category-image" style="background-image: url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=600&h=800&fit=crop');"></div>
                    <div class="category-overlay"></div>
                    <div class="category-content">
                        <h3 class="category-title">Nightlife</h3>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Results Section -->
    <section class="results-section" id="resultsSection" style="display: none;">
        <div class="container">
            <div id="placesList"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <span class="footer-text">LUXE TRAVEL © 2024</span>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
