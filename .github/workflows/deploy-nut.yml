name: Deploy Nut to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Nut to gh-pages
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout --orphan gh-pages
          rm -rf .git/index
          git clean -fdx
          cp -r Nut/* .
          git add .
          git commit -m "Deploy Nut app to GitHub Pages" || true
          git push -f origin gh-pages
