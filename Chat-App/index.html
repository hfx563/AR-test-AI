<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveChat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Join screen ── -->
  <div id="join-screen">
    <div class="join-box">
      <div class="logo">💬</div>
      <h1>LiveChat</h1>
      <p>Enter your name and password to join.</p>
      <input id="name-input" type="text" placeholder="Your name..." maxlength="24" autocomplete="off" />
      <input id="pass-input" type="password" placeholder="Password..." autocomplete="off" />
      <button id="join-btn">Join Chat</button>
      <span id="join-error"></span>
    </div>
  </div>

  <!-- ── Chat screen ── -->
  <div id="chat-screen" class="hidden">
    <header>
      <div class="header-left">
        <span class="logo-icon">💬</span>
        <span class="room-name">LiveChat</span>
        <span id="conn-dot" class="dot-offline" title="Connecting..."></span>
      </div>
      <div class="header-center">
        <span id="online-badge">🟢 <span id="online-num">1</span> online</span>
      </div>
      <div class="header-right">
        <button id="call-btn"       class="hbtn call-voice" title="Voice call">📞</button>
        <button id="video-call-btn" class="hbtn call-video" title="Video call">📹</button>
        <div class="hbtn-divider"></div>
        <button id="refresh-btn"    class="hbtn" title="Auto-refresh ON">🔄</button>
        <button id="clear-btn"      class="hbtn" title="Clear history">🗑️</button>
        <div class="hbtn-divider"></div>
        <button id="leave-btn"      class="hbtn" title="Leave">✕</button>
      </div>
    </header>

    <div id="messages"></div>
    <div id="typing-bar"></div>

    <form id="msg-form">
      <input id="msg-input" type="text" placeholder="Type a message..." maxlength="500" autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>

  <!-- ── Clear modal ── -->
  <div id="modal" class="hidden">
    <div class="modal-box">
      <p>🗑️ Clear all chat history for everyone?</p>
      <div class="modal-btns">
        <button id="modal-yes">Yes, clear</button>
        <button id="modal-no">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Call overlay ── -->
  <div id="call-overlay" class="hidden">
    <div class="call-box">

      <div id="video-box" class="video-box" style="display:none">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video"  autoplay playsinline muted class="local-video"></video>
      </div>

      <div id="call-avatar" class="call-avatar">📞</div>
      <div id="call-name"     class="call-name"></div>
      <div id="call-status"   class="call-status"></div>
      <div id="call-duration" class="call-duration"></div>

      <div class="call-actions">
        <div class="call-action-group" id="group-incoming">
          <div class="call-action-wrap">
            <button id="btn-decline" class="call-action-btn decline" title="Decline">📵</button>
            <span class="call-action-label">Decline</span>
          </div>
          <div class="call-action-wrap">
            <button id="btn-accept" class="call-action-btn accept" title="Accept">📞</button>
            <span class="call-action-label">Accept</span>
          </div>
        </div>
        <div class="call-action-group" id="group-active" style="display:none">
          <div class="call-action-wrap">
            <button id="btn-mute" class="call-action-btn mute" title="Mute">🎤</button>
            <span class="call-action-label">Mute</span>
          </div>
          <div class="call-action-wrap" id="wrap-cam" style="display:none">
            <button id="btn-cam" class="call-action-btn cam" title="Camera">📷</button>
            <span class="call-action-label">Camera</span>
          </div>
          <div class="call-action-wrap">
            <button id="btn-hangup" class="call-action-btn hangup" title="Hang up">📵</button>
            <span class="call-action-label">End</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="chat.js"></script>
  <script src="call.js"></script>
</body>
</html>
