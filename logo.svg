<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>

    <!-- Background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- Node glow filter -->
    <filter id="nodeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Line glow filter -->
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Outer glow for bubble -->
    <filter id="outerGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Accent gradient for nodes -->
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <!-- Line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity=".5"/>
    </linearGradient>

    <!-- Bubble stroke gradient -->
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity=".7"/>
    </linearGradient>

  </defs>

  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>

  <!-- ── Chat bubble outline (implied, thin) ── -->
  <g filter="url(#outerGlow)">
    <path
      d="M22 20 Q22 14 28 14 L72 14 Q78 14 78 20 L78 58 Q78 64 72 64 L44 64 L36 74 L36 64 L28 64 Q22 64 22 58 Z"
      fill="none"
      stroke="url(#bubbleGrad)"
      stroke-width="1"
      opacity="0.55"
    />
  </g>

  <!-- ── Neural network connections (lines) ── -->
  <g filter="url(#lineGlow)" stroke="url(#lineGrad)" stroke-width="0.7" fill="none">
    <!-- Center hub to all outer nodes -->
    <line x1="50" y1="39" x2="35" y2="28"/>
    <line x1="50" y1="39" x2="50" y2="24"/>
    <line x1="50" y1="39" x2="65" y2="28"/>
    <line x1="50" y1="39" x2="66" y2="44"/>
    <line x1="50" y1="39" x2="58" y2="55"/>
    <line x1="50" y1="39" x2="42" y2="55"/>
    <line x1="50" y1="39" x2="34" y2="44"/>
    <!-- Outer ring connections -->
    <line x1="35" y1="28" x2="50" y2="24"/>
    <line x1="50" y1="24" x2="65" y2="28"/>
    <line x1="65" y1="28" x2="66" y2="44"/>
    <line x1="66" y1="44" x2="58" y2="55"/>
    <line x1="58" y1="55" x2="42" y2="55"/>
    <line x1="42" y1="55" x2="34" y2="44"/>
    <line x1="34" y1="44" x2="35" y2="28"/>
    <!-- Cross connections for density -->
    <line x1="35" y1="28" x2="66" y2="44" opacity=".35"/>
    <line x1="65" y1="28" x2="34" y2="44" opacity=".35"/>
    <line x1="50" y1="24" x2="58" y2="55" opacity=".25"/>
    <line x1="50" y1="24" x2="42" y2="55" opacity=".25"/>
  </g>

  <!-- ── Nodes ── -->
  <g filter="url(#nodeGlow)">

    <!-- Center hub — largest, brightest -->
    <circle cx="50" cy="39" r="3.2" fill="url(#nodeGrad)">
      <animate attributeName="r" values="3.2;4;3.2" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.7;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>

    <!-- Top center -->
    <circle cx="50" cy="24" r="2" fill="#22D3EE" opacity=".9">
      <animate attributeName="opacity" values=".9;.4;.9" dur="3s" begin="0.3s" repeatCount="indefinite"/>
    </circle>

    <!-- Top left -->
    <circle cx="35" cy="28" r="1.8" fill="#6366F1" opacity=".85">
      <animate attributeName="opacity" values=".85;.35;.85" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Top right -->
    <circle cx="65" cy="28" r="1.8" fill="#22D3EE" opacity=".85">
      <animate attributeName="opacity" values=".85;.35;.85" dur="3.2s" begin="0.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Mid right -->
    <circle cx="66" cy="44" r="1.8" fill="#8B5CF6" opacity=".85">
      <animate attributeName="opacity" values=".85;.4;.85" dur="2.6s" begin="0.9s" repeatCount="indefinite"/>
    </circle>

    <!-- Bottom right -->
    <circle cx="58" cy="55" r="1.8" fill="#6366F1" opacity=".8">
      <animate attributeName="opacity" values=".8;.3;.8" dur="3.4s" begin="0.4s" repeatCount="indefinite"/>
    </circle>

    <!-- Bottom left -->
    <circle cx="42" cy="55" r="1.8" fill="#22D3EE" opacity=".8">
      <animate attributeName="opacity" values=".8;.3;.8" dur="2.9s" begin="0.7s" repeatCount="indefinite"/>
    </circle>

    <!-- Mid left -->
    <circle cx="34" cy="44" r="1.8" fill="#8B5CF6" opacity=".85">
      <animate attributeName="opacity" values=".85;.4;.85" dur="3.1s" begin="0.1s" repeatCount="indefinite"/>
    </circle>

  </g>

  <!-- ── Bubble tail dot (chat indicator) ── -->
  <circle cx="36" cy="71" r="1.2" fill="#6366F1" opacity=".6">
    <animate attributeName="opacity" values=".6;.2;.6" dur="2s" repeatCount="indefinite"/>
  </circle>

</svg>
